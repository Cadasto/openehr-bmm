# Run from repo root: docker compose -f .docker/docker-compose.yml <cmd>
# Or set COMPOSE_FILE=.docker/docker-compose.yml / use Makefile targets.
services:
  app:
    build:
      context: ..
      dockerfile: .docker/Dockerfile
    working_dir: /app
    volumes:
      - ..:/app
      - app-data:/data
    env_file:
      - path: ../.env
        required: false

volumes:
  app-data:
