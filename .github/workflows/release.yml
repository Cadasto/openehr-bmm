name: Release

# Releases run on version tags: SemVer only, no "v" prefix (e.g. 1.0.0, 2.1.3)
on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.composer/cache/files
            ~/.cache/composer/files
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress --ignore-platform-req=ext-xdebug

      - name: Validate package
        run: composer ci

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Trigger Packagist update (token)
        if: ${{ secrets.PACKAGIST_API_TOKEN != '' }}
        env:
          PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}
        run: |
          curl --fail --show-error --silent \
            -X POST \
            -H "content-type:application/json" \
            -d '{"repository":{"url":"https://github.com/'"${{ github.repository }}"'"}}' \
            "https://packagist.org/api/update-package?username=token&apiToken=${PACKAGIST_API_TOKEN}"

      - name: Trigger Packagist update (username/token)
        if: ${{ secrets.PACKAGIST_API_TOKEN == '' && secrets.PACKAGIST_USERNAME != '' && secrets.PACKAGIST_TOKEN != '' }}
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_TOKEN }}
        run: |
          curl --fail --show-error --silent \
            -X POST \
            -H "content-type:application/json" \
            -d '{"repository":{"url":"https://github.com/'"${{ github.repository }}"'"}}' \
            "https://packagist.org/api/update-package?username=${PACKAGIST_USERNAME}&apiToken=${PACKAGIST_TOKEN}"

      - name: Packagist not configured
        if: ${{ secrets.PACKAGIST_API_TOKEN == '' && (secrets.PACKAGIST_USERNAME == '' || secrets.PACKAGIST_TOKEN == '') }}
        run: echo "Packagist secrets not configured; skipping Packagist update trigger."
