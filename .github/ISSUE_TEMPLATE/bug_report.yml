name: Bug report
description: Report a reproducible defect in the library.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Please provide enough detail to reproduce the issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact steps and code snippets.
      placeholder: |
        1. Install package...
        2. Run...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: 8.4.x
    validations:
      required: true
  - type: input
    id: package-version
    attributes:
      label: Package version / commit
      placeholder: 1.2.3 or abc1234
    validations:
      required: true
